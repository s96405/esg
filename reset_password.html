<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>設定新密碼 | 智慧植物照護系統</title>
<style>
:root{
  --bg1:#0b1220;
  --bg2:#1e293b;
  --txt:#e5e7eb;
  --accent:#60a5fa;
}
*{box-sizing:border-box;}
body{
  margin:0;
  height:100vh;
  min-height:100svh;
  display:grid;
  place-items:center;
  background:
    radial-gradient(1000px at 10% 20%, #3b82f6 0%, transparent 70%),
    radial-gradient(800px at 80% 80%, #10b981 0%, transparent 70%),
    linear-gradient(160deg,var(--bg1),var(--bg2));
  font-family:"Microsoft JhengHei",sans-serif;
  color:var(--txt);
}
.card{
  width:min(90%,360px);
  padding:32px 28px 24px;
  border-radius:20px;
  background:rgba(15,23,42,0.9);
  border:1px solid rgba(148,163,184,0.3);
  backdrop-filter:blur(16px) saturate(120%);
  -webkit-backdrop-filter:blur(16px) saturate(120%);
  box-shadow:0 20px 45px rgba(15,23,42,0.9);
  text-align:center;
}
h2{margin:0 0 8px;letter-spacing:.5px;font-size:20px;}
.subtitle{font-size:13px;color:#9ca3af;margin-bottom:18px;}
.field{position:relative;margin:10px 0;}
input{
  width:100%;
  padding:11px 14px;
  border-radius:30px;
  border:1px solid rgba(148,163,184,0.4);
  background:rgba(15,23,42,0.9);
  color:var(--txt);
  outline:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
  font-size:13px;
}
input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(96,165,250,0.35);
  background:#020617;
}
input::placeholder{color:#64748b;}
button{
  width:100%;
  margin-top:14px;
  padding:11px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#60a5fa,#34d399);
  color:#0b1220;
  font-weight:700;
  letter-spacing:.3px;
  cursor:pointer;
  box-shadow:0 12px 25px rgba(34,197,94,0.35);
  transition:transform .06s,box-shadow .1s;
}
button:active{
  transform:translateY(1px);
  box-shadow:0 6px 15px rgba(15,23,42,0.9);
}
button:disabled{
  opacity:.65;
  cursor:not-allowed;
  transform:none;
  box-shadow:none;
}
.msg{
  margin-top:10px;
  font-size:12px;
  min-height:16px;
  line-height:1.5;
}
.msg.error{color:#fecaca;}
.msg.ok{color:#bbf7d0;}
.entry-links{
  margin-top:14px;
  font-size:12px;
}
.entry-links a{
  color:#bfdbfe;
  text-decoration:none;
  border-bottom:1px solid transparent;
  transition:border-color .15s,color .15s;
}
.entry-links a:hover{
  color:#eff6ff;
  border-bottom-color:currentColor;
}
@media (max-width:480px){
  body{padding:16px;}
  .card{padding:26px 20px 22px;border-radius:16px;}
  h2{font-size:18px;}
  .subtitle{font-size:12px;}
}
</style>
<link rel="stylesheet" href="ui.css" />
</head>
<body class="login-page">
  <div class="card">
    <h2>設定新密碼</h2>
    <div class="subtitle">請輸入並確認你的新密碼</div>

    <div class="field">
      <input id="newPwd" type="password" placeholder="新密碼" autocomplete="new-password" />
    </div>
    <div class="field">
      <input id="newPwd2" type="password" placeholder="確認新密碼" autocomplete="new-password" />
    </div>

    <button id="saveBtn" type="button" disabled>更新密碼</button>
    <div id="msg" class="msg"></div>
    <div class="entry-links">
      <a href="login.html">回到登入頁</a>
    </div>
  </div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

  const SUPABASE_URL = "https://jmimieqvhrdpdvovorhx.supabase.co";
  const SUPABASE_KEY = "sb_publishable_23gcxoA6juzOJOQga7ZihQ_3kdW4wIc";
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  const newPwd = document.getElementById("newPwd");
  const newPwd2 = document.getElementById("newPwd2");
  const saveBtn = document.getElementById("saveBtn");
  const msgEl = document.getElementById("msg");

  function showMsg(text, ok=false){
    msgEl.textContent = text;
    msgEl.className = "msg " + (ok ? "ok" : "error");
  }

  function loginUrl(){
    const currentDir = location.pathname.replace(/[^/]*$/, "");
    return `${location.origin}${currentDir}login.html`;
  }

  async function ensureRecoverySession(){
    const params = new URLSearchParams(location.search);
    const code = params.get("code");
    if(code){
      const { error } = await supabase.auth.exchangeCodeForSession(location.href);
      if(error){
        console.error(error);
        showMsg("重設密碼連結已失效，請重新寄送。");
        saveBtn.disabled = true;
        return;
      }
      history.replaceState(null, "", location.pathname);
    }

    const { data, error } = await supabase.auth.getSession();
    if(error){
      console.error(error);
      showMsg("無法確認重設密碼狀態，請重新寄送。");
      saveBtn.disabled = true;
      return;
    }

    if(!data?.session){
      showMsg("重設密碼連結已失效，請重新寄送。");
      saveBtn.disabled = true;
      return;
    }

    saveBtn.disabled = false;
  }

  async function updatePassword(){
    const password = newPwd.value;
    const confirmPassword = newPwd2.value;

    showMsg("");

    if(password.length < 6){
      showMsg("新密碼至少 6 碼");
      return;
    }

    if(password !== confirmPassword){
      showMsg("兩次密碼不一致");
      return;
    }

    saveBtn.disabled = true;
    saveBtn.textContent = "更新中...";

    let updated = false;
    try{
      const { error } = await supabase.auth.updateUser({ password });
      if(error){
        console.error(error);
        showMsg("密碼更新失敗，請重新寄送重設信。");
        return;
      }

      sessionStorage.removeItem("appUser");
      await supabase.auth.signOut();
      updated = true;
      showMsg("密碼已更新，請重新登入", true);
      setTimeout(() => {
        location.href = loginUrl();
      }, 1800);
    }catch(error){
      console.error(error);
      showMsg("密碼更新失敗，請重新寄送重設信。");
    }finally{
      if(!updated){
        saveBtn.disabled = false;
        saveBtn.textContent = "更新密碼";
      }
    }
  }

  saveBtn.addEventListener("click", updatePassword);
  newPwd.addEventListener("keydown", e => {
    if(e.key === "Enter") updatePassword();
  });
  newPwd2.addEventListener("keydown", e => {
    if(e.key === "Enter") updatePassword();
  });

  ensureRecoverySession();
</script>
</body>
</html>
