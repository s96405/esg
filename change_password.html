<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>智慧植物照護系統 | 修改密碼</title>
<style>
:root{
  --bg:#050a16;
  --card:#0b1430;
  --border:rgba(255,255,255,0.10);
  --txt:#e5e7eb;
  --sub:#9ca3af;
  --accent:#22d3ee;
  --accent2:#f472b6;
  --danger:#f97373;
  --ok:#22c55e;
  --shadowGlow: 0 0 0 1px rgba(34,211,238,.10), 0 18px 50px rgba(2,132,199,.18);
}
*{box-sizing:border-box;}
body{
  margin:0;
  min-height:100vh;
  min-height:100svh;
  background:
    radial-gradient(900px 520px at 18% -10%, rgba(34,211,238,.35), transparent 62%),
    radial-gradient(820px 520px at 110% 22%, rgba(244,114,182,.18), transparent 60%),
    radial-gradient(1000px 700px at 50% 120%, rgba(14,165,233,.10), transparent 62%),
    linear-gradient(180deg, #050a16 0%, #03060e 100%);
  color:var(--txt);
  font-family:"Microsoft JhengHei",system-ui,sans-serif;
}
.wrap{
  max-width:520px;
  margin:26px auto;
  padding:0 16px;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 16px;
  border:1px solid rgba(255,255,255,0.10);
  background:rgba(5,10,22,0.60);
  border-radius:18px;
  backdrop-filter:blur(12px);
}
.title{
  font-weight:900;
  letter-spacing:.3px;
}
.user{
  font-size:12px;
  color:#cbd5e1;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.10);
  background:rgba(255,255,255,0.04);
}
.card{
  margin-top:14px;
  padding:16px 16px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.10);
  background:rgba(5,10,22,0.60);
  border-radius:18px;
  box-shadow:0 18px 60px rgba(0,0,0,.45);
}
.label{
  font-size:12px;
  color:var(--sub);
  margin:10px 0 6px;
}
input{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.10);
  background:rgba(255,255,255,0.03);
  color:var(--txt);
  outline:none;
}
input:focus{
  border-color:rgba(34,211,238,0.55);
  box-shadow:0 0 0 2px rgba(34,211,238,0.18);
}
.row{
  display:flex;
  gap:10px;
  margin-top:12px;
}
.btn{
  flex:1;
  padding:10px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.10);
  background:rgba(255,255,255,0.03);
  color:var(--txt);
  cursor:pointer;
}
.btn.primary{
  border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#020617;
  font-weight:900;
}
.msg{
  margin-top:10px;
  font-size:12px;
  min-height:16px;
}
.msg.error{color:#fecaca;}
.msg.ok{color:#bbf7d0;}
.small{
  margin-top:10px;
  color:var(--sub);
  font-size:12px;
  line-height:1.5;
}
a.link{ color:#93c5fd; text-decoration:none; }
a.link:hover{ text-decoration:underline; }

/* ===== RWD (mobile) ===== */
@media (max-width:480px){
  .wrap{
    margin:16px auto;
    padding:0 12px;
  }
  .topbar{
    flex-direction:column;
    gap:8px;
    align-items:flex-start;
  }
  .title{
    font-size:16px;
  }
  .user{
    font-size:11px;
  }
  .card{
    padding:14px 14px 12px;
  }
  .row{
    flex-direction:column;
  }
  .btn{
    width:100%;
  }
}
</style>
<link rel="stylesheet" href="ui.css" />
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="side-top">
      <div class="logo-dot">植</div>
      <div class="side-brand">
        <div class="name">智慧植物照護系統</div>
        <div class="sub"></div>
      </div>
    </div>

    <nav id="sideNav" class="nav"></nav>

    <div class="side-bottom">
      <a href="login.html" id="sideLogout" title="登出">
        <span class="ico">出</span>
        <span>登出</span>
      </a>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button id="btnMenu" class="menu-btn">☰</button>
        <div>
          <div class="topbar-title-main">修改密碼</div>
          <div class="topbar-title-sub"></div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="user" id="who">—</div>
      </div>
    </div>

    <div class="wrap">
      <div class="card">
        <div class="label">舊密碼</div>
        <input id="oldPwd" type="password" placeholder="舊密碼" autocomplete="current-password" />

        <div class="label">新密碼</div>
        <input id="newPwd" type="password" placeholder="新密碼" autocomplete="new-password" />

        <div class="label">確認新密碼</div>
        <input id="newPwd2" type="password" placeholder="確認新密碼" autocomplete="new-password" />

        <div class="row">
          <button class="btn" id="backBtn">回首頁</button>
          <button class="btn primary" id="saveBtn">儲存</button>
        </div>

        <div id="msg" class="msg"></div>

      </div>
    </div>
  </main>
</div>

<div id="overlay" class="overlay"></div>

<script type="module">
  // ===== Auth check =====
  const rawAppUser = sessionStorage.getItem("appUser");
  if (!rawAppUser) location.href = "login.html";
  const appUser = JSON.parse(rawAppUser);

  const showName = (appUser.display_name && String(appUser.display_name).trim())
    ? appUser.display_name
    : (appUser.username || "使用者");
  document.getElementById("who").textContent = showName;

  document.getElementById("backBtn").onclick = () => location.href = "index.html";

  // Sidebar nav
  const sideNav = document.getElementById("sideNav");
  const navItems = [
    { href:"index.html", icon:"總", text:"儀表板", active:false },
    { href:"control.html", icon:"控", text:"控制台", active:false },
    { href:"history.html", icon:"歷", text:"歷史資料", active:false },
    { href:"change_password.html", icon:"密", text:"修改密碼", active:true },
  ];
  if (appUser.role === "admin"){
    navItems.push({ href:"user.html", icon:"人", text:"使用者管理", active:false });
  }
  sideNav.innerHTML = navItems.map(it => {
    return `<a class="${it.active ? "active" : ""}" href="${it.href}">
      <span class="ico">${it.icon}</span><span>${it.text}</span>
    </a>`;
  }).join("");

  function doLogout(){
    sessionStorage.removeItem("appUser");
    location.href = "login.html";
  }
  document.getElementById("sideLogout").onclick = (e)=>{ e.preventDefault(); doLogout(); };

  const btnMenu = document.getElementById("btnMenu");
  const sidebar = document.querySelector(".sidebar");
  const overlay = document.getElementById("overlay");
  if (btnMenu){
    btnMenu.onclick = () => {
      sidebar.classList.add("open");
      overlay.classList.add("show");
    };
    overlay.onclick = () => {
      sidebar.classList.remove("open");
      overlay.classList.remove("show");
    };
  }
  sideNav.querySelectorAll("a").forEach(a=>{
    a.addEventListener("click", ()=>{
      sidebar.classList.remove("open");
      overlay.classList.remove("show");
    });
  });

  // ===== Supabase =====
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
  const SUPABASE_URL = "https://jmimieqvhrdpdvovorhx.supabase.co";
  const SUPABASE_KEY = "sb_publishable_23gcxoA6juzOJOQga7ZihQ_3kdW4wIc";
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  const oldPwd = document.getElementById("oldPwd");
  const newPwd = document.getElementById("newPwd");
  const newPwd2 = document.getElementById("newPwd2");
  const saveBtn = document.getElementById("saveBtn");
  const msgEl = document.getElementById("msg");

  function setMsg(text, ok=false){
    msgEl.textContent = text;
    msgEl.className = "msg " + (ok ? "ok" : "error");
  }

  saveBtn.onclick = async () => {
    setMsg("");

    const op = oldPwd.value;
    const np = newPwd.value;
    const np2 = newPwd2.value;

    if (!op || !np || !np2) return setMsg("請把 3 個欄位都填完");
    if (np.length < 4) return setMsg("新密碼至少 4 碼");
    if (np !== np2) return setMsg("兩次新密碼不一致");

    saveBtn.disabled = true;
    saveBtn.textContent = "儲存中...";

    // ✅ 驗證舊密碼：只能驗自己的帳號 (用 id 限制)
    const { data: me, error: e1 } = await supabase
      .from("app_users")
      .select("id,password")
      .eq("id", appUser.id)
      .maybeSingle();

    if (e1){
      console.error(e1);
      saveBtn.disabled = false;
      saveBtn.textContent = "儲存";
      return setMsg("讀取帳號失敗，稍後再試");
    }

    if (!me) {
      saveBtn.disabled = false;
      saveBtn.textContent = "儲存";
      return setMsg("找不到你的帳號資料");
    }

    if (String(me.password) !== String(op)) {
      saveBtn.disabled = false;
      saveBtn.textContent = "儲存";
      return setMsg("舊密碼錯誤");
    }

    // ✅ 更新密碼：只能更新自己的 id
    const { error: e2 } = await supabase
      .from("app_users")
      .update({ password: np })
      .eq("id", appUser.id);

    saveBtn.disabled = false;
    saveBtn.textContent = "儲存";

    if (e2){
      console.error(e2);
      return setMsg("更新失敗，稍後再試");
    }

    oldPwd.value = "";
    newPwd.value = "";
    newPwd2.value = "";
    setMsg("更新成功！", true);
  };
</script>

</body>
</html>
