<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#edf4ee" />
<title>註冊 | 智慧植物照護系統</title>
<link rel="stylesheet" href="register.css" />
</head>
<body class="register-page">
  <main class="register-shell">
    <section class="register-intro">
      <a class="brand" href="landing.html">
        <span class="brand-mark">植</span>
        <span class="brand-copy">
          <strong>智慧植物照護系統</strong>
          <small>建立你的照護工作台</small>
        </span>
      </a>

      <p class="eyebrow">Create account</p>
      <h1>先註冊，再登入後台</h1>
      <p class="lead">
        完成帳號建立後，就能進入植物監控儀表板，查看感測資料、控制水泵並接收告警。
      </p>

      <ul class="benefits">
        <li>預設使用者角色為 <strong>user</strong></li>
        <li>註冊資料直接寫入現有 <strong>app_users</strong> 表</li>
        <li>不改登入邏輯，登入成功仍導向後台首頁</li>
      </ul>
    </section>

    <section class="register-card">
      <div class="card-head">
        <p class="eyebrow">帳號註冊</p>
        <h2>建立新帳號</h2>
        <p class="sub">請填入必要欄位，系統會先檢查帳號與 email 是否重複。</p>
      </div>

      <form id="registerForm" class="register-form" novalidate>
        <label class="field">
          <span>電子郵件 email</span>
          <input id="email" type="email" autocomplete="email" placeholder="請輸入 email" />
        </label>

        <label class="field">
          <span>使用者名稱 username</span>
          <input id="username" type="text" autocomplete="username" placeholder="請輸入帳號" />
        </label>

        <label class="field">
          <span>顯示名稱 display_name</span>
          <input id="displayName" type="text" autocomplete="nickname" placeholder="例如：小明" />
        </label>

        <label class="field">
          <span>密碼 password</span>
          <input id="password" type="password" autocomplete="new-password" placeholder="請輸入密碼" />
        </label>

        <label class="field">
          <span>確認密碼 confirm_password</span>
          <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="再次輸入密碼" />
        </label>

        <button id="submitBtn" class="submit-btn" type="submit">註冊</button>
        <div id="msg" class="msg" aria-live="polite"></div>
      </form>

      <div class="footer-links">
        <a href="login.html">已有帳號？登入</a>
        <a href="landing.html">回到系統介紹頁</a>
      </div>
    </section>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://jmimieqvhrdpdvovorhx.supabase.co";
    const SUPABASE_KEY = "sb_publishable_23gcxoA6juzOJOQga7ZihQ_3kdW4wIc";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById("registerForm");
    const emailEl = document.getElementById("email");
    const usernameEl = document.getElementById("username");
    const displayNameEl = document.getElementById("displayName");
    const passwordEl = document.getElementById("password");
    const confirmPasswordEl = document.getElementById("confirmPassword");
    const submitBtn = document.getElementById("submitBtn");
    const msgEl = document.getElementById("msg");

    function setMsg(text, kind = "") {
      msgEl.textContent = text;
      msgEl.className = `msg${kind ? ` ${kind}` : ""}`;
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.textContent = loading ? "註冊中..." : "註冊";
    }

    async function handleRegister() {
      const email = emailEl.value.trim();
      const username = usernameEl.value.trim();
      const displayName = displayNameEl.value.trim();
      const password = passwordEl.value;
      const confirmPassword = confirmPasswordEl.value;

      setMsg("");

      if (!email) return setMsg("請輸入 email", "error");
      if (!username) return setMsg("請輸入使用者名稱", "error");
      if (!displayName) return setMsg("請輸入顯示名稱", "error");
      if (!password) return setMsg("請輸入密碼", "error");
      if (password !== confirmPassword) return setMsg("兩次輸入的密碼不一致", "error");

      setLoading(true);

      try {
        const [{ data: existingUsernameRows, error: usernameError }, { data: existingEmailRows, error: emailError }] = await Promise.all([
          supabase
            .from("app_users")
            .select("id")
            .eq("username", username)
            .limit(1),
          supabase
            .from("app_users")
            .select("id")
            .eq("email", email)
            .limit(1)
        ]);

        if (usernameError) {
          console.error(usernameError);
          setMsg("檢查帳號時發生錯誤，請稍後再試。", "error");
          setLoading(false);
          return;
        }

        if (emailError) {
          console.error(emailError);
          setMsg("檢查 email 時發生錯誤，請稍後再試。", "error");
          setLoading(false);
          return;
        }

        if (existingUsernameRows && existingUsernameRows.length > 0) {
          setMsg("此使用者名稱已被註冊，請更換帳號。", "error");
          setLoading(false);
          return;
        }

        if (existingEmailRows && existingEmailRows.length > 0) {
          setMsg("此 email 已被註冊，請更換 email。", "error");
          setLoading(false);
          return;
        }

        const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
          email,
          password
        });

        if (signUpError) {
          console.error(signUpError);
          setMsg("註冊失敗，請稍後再試。", "error");
          setLoading(false);
          return;
        }

        const authUser = signUpData?.user;
        if (!authUser) {
          setMsg("註冊成功，但尚未取得帳號資訊，請稍後再試登入。", "error");
          setLoading(false);
          return;
        }

        if (signUpData?.session) {
          const { error: signOutError } = await supabase.auth.signOut();
          if (signOutError) {
            console.error(signOutError);
            setMsg("帳號已建立，但暫時無法清除登入狀態，請稍後再試。", "error");
            setLoading(false);
            return;
          }
        }

        const { error: profileError } = await supabase
          .from("app_users")
          .insert([{
            auth_user_id: authUser.id,
            email,
            username,
            display_name: displayName,
            password: "",
            role: "user"
          }]);

        if (profileError) {
          console.error(profileError);
          setMsg("帳號已建立，但個人資料建立失敗，請稍後再試。", "error");
          setLoading(false);
          return;
        }

        setMsg("註冊成功，請登入", "ok");
        setTimeout(() => {
          location.href = "login.html";
        }, 1100);
      } catch (err) {
        console.error(err);
        setMsg("註冊時發生錯誤，請稍後再試。", "error");
        setLoading(false);
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      handleRegister();
    });

    [emailEl, usernameEl, displayNameEl, passwordEl, confirmPasswordEl].forEach((input) => {
      input.addEventListener("input", () => {
        if (msgEl.classList.contains("error")) {
          setMsg("");
        }
      });
    });
  </script>
</body>
</html>
