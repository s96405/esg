<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#edf4ee" />
<title>註冊 | 智慧植物照護系統</title>
<link rel="stylesheet" href="register.css" />
</head>
<body class="register-page">
  <main class="register-shell">
    <section class="register-intro">
      <a class="brand" href="landing.html">
        <span class="brand-mark">植</span>
        <span class="brand-copy">
          <strong>智慧植物照護系統</strong>
          <small>建立你的照護工作台</small>
        </span>
      </a>

      <p class="eyebrow">CREATE ACCOUNT</p>
      <h1>建立你的植物照護帳號</h1>
      <p class="lead">
        註冊後即可查看植物感測資料、控制澆水設備，並接收照護提醒。
      </p>

      <ul class="benefits">
        <li>即時查看土壤濕度與水位</li>
        <li>遠端控制水泵與自動澆水設定</li>
        <li>接收 LINE 照護通知</li>
      </ul>
    </section>

    <section class="register-card">
      <div class="card-head">
        <p class="eyebrow">帳號註冊</p>
        <h2>建立新帳號</h2>
        <p class="sub">請填寫以下資料完成註冊。</p>
      </div>

      <form id="registerForm" class="register-form" novalidate>
        <label class="field">
          <span>電子郵件</span>
          <input id="email" type="email" autocomplete="email" placeholder="請輸入電子郵件" />
        </label>

        <label class="field">
          <span>使用者名稱</span>
          <input id="username" type="text" autocomplete="username" placeholder="請輸入使用者名稱" />
        </label>

        <label class="field">
          <span>顯示名稱</span>
          <input id="displayName" type="text" autocomplete="nickname" placeholder="例如：小明" />
        </label>

        <label class="field">
          <span>密碼</span>
          <input id="password" type="password" autocomplete="new-password" placeholder="請輸入密碼" />
        </label>

        <label class="field">
          <span>確認密碼</span>
          <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="請再次輸入密碼" />
        </label>

        <button id="submitBtn" class="submit-btn" type="submit">註冊</button>
        <div id="msg" class="msg" aria-live="polite"></div>
      </form>

      <div class="footer-links">
        <a href="login.html">已有帳號？登入</a>
        <a href="landing.html">回到系統介紹頁</a>
      </div>
    </section>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://jmimieqvhrdpdvovorhx.supabase.co";
    const SUPABASE_KEY = "sb_publishable_23gcxoA6juzOJOQga7ZihQ_3kdW4wIc";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById("registerForm");
    const emailEl = document.getElementById("email");
    const usernameEl = document.getElementById("username");
    const displayNameEl = document.getElementById("displayName");
    const passwordEl = document.getElementById("password");
    const confirmPasswordEl = document.getElementById("confirmPassword");
    const submitBtn = document.getElementById("submitBtn");
    const msgEl = document.getElementById("msg");

    function setMsg(text, kind = "") {
      msgEl.textContent = text;
      msgEl.className = `msg${kind ? ` ${kind}` : ""}`;
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.textContent = loading ? "註冊中..." : "註冊";
    }

    function normalizeProfileError(error) {
      if (error?.code !== "23505") {
        return "帳號已建立，但個人資料建立失敗，請聯絡管理員。";
      }

      const detail = `${error.message || ""} ${error.details || ""}`;
      if (detail.includes("app_users_username_key")) {
        return "使用者名稱已被註冊";
      }
      if (detail.includes("app_users_email_key")) {
        return "電子郵件已被註冊";
      }
      if (detail.includes("app_users_auth_user_id_key")) {
        return "此帳號已建立，請直接登入";
      }
      return "帳號資料已存在";
    }

    async function handleRegister() {
      const email = emailEl.value.trim();
      const username = usernameEl.value.trim();
      const displayName = displayNameEl.value.trim();
      const password = passwordEl.value;
      const confirmPassword = confirmPasswordEl.value;

      setMsg("");

      if (!email) return setMsg("請輸入電子郵件", "error");
      if (!username) return setMsg("請輸入使用者名稱", "error");
      if (!displayName) return setMsg("請輸入顯示名稱", "error");
      if (!password) return setMsg("請輸入密碼", "error");
      if (password !== confirmPassword) return setMsg("兩次輸入的密碼不一致", "error");

      setLoading(true);

      try {
        const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
          email,
          password
        });

        if (signUpError) {
          console.error(signUpError);
          setMsg("註冊失敗，請稍後再試。", "error");
          setLoading(false);
          return;
        }

        const authUser = signUpData?.user;
        if (!authUser) {
          setMsg("註冊成功，但尚未取得帳號資訊，請稍後再試登入。", "error");
          setLoading(false);
          return;
        }

        if (signUpData?.session) {
          const { error: signOutError } = await supabase.auth.signOut();
          if (signOutError) {
            console.error(signOutError);
            setMsg("帳號已建立，但暫時無法清除登入狀態，請稍後再試。", "error");
            setLoading(false);
            return;
          }
        }

        const { error: profileError } = await supabase
          .from("app_users")
          .insert([{
            auth_user_id: authUser.id,
            email,
            username,
            display_name: displayName,
            password: "",
            role: "user"
          }]);

        if (profileError) {
          console.error(profileError);
          setMsg(normalizeProfileError(profileError), "error");
          setLoading(false);
          return;
        }

        setMsg("註冊成功！請先前往電子郵件信箱完成驗證，再回到登入頁登入系統。", "ok");
        setTimeout(() => {
          location.href = "login.html";
        }, 3000);
      } catch (err) {
        console.error(err);
        setMsg("註冊時發生錯誤，請稍後再試。", "error");
        setLoading(false);
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      handleRegister();
    });

    [emailEl, usernameEl, displayNameEl, passwordEl, confirmPasswordEl].forEach((input) => {
      input.addEventListener("input", () => {
        if (msgEl.classList.contains("error")) {
          setMsg("");
        }
      });
    });
  </script>
</body>
</html>
